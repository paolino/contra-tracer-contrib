name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Test with CHaP's contra-tracer (simple function-based API)
  build-iohk:
    runs-on: nixos
    name: build (iohk/CHaP)

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build library
        run: nix build .#lib-iohk --quiet

      - name: Build tests
        run: nix build .#unit-tests-iohk --quiet

      - name: Run tests
        run: nix run .#unit-tests-iohk --quiet

  # Test with Hackage's contra-tracer (arrow-based API)
  build-hackage:
    runs-on: nixos
    name: build (Hackage)

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build library
        run: nix build .#lib --quiet

      - name: Build tests
        run: nix build .#unit-tests --quiet

      - name: Run tests
        run: nix run .#unit-tests --quiet

  lint:
    runs-on: nixos

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check formatting
        run: nix develop --quiet -c fourmolu -m check src test

      - name: Lint
        run: nix develop --quiet -c hlint src test

      - name: Hackage compatibility
        run: nix develop --quiet -c cabal check
